<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descargar Aplicación</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f2f5;
            color: #333;
        }
        .card {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        h1 { color: #1a1a1a; margin-bottom: 0.5rem; }
        p { color: #666; margin-bottom: 2rem; }
        .download-btn {
            display: inline-block;
            padding: 15px 30px;
            background-color: #2ea44f;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            transition: background 0.3s ease;
        }
        .download-btn:hover {
            background-color: #2c974b;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>¡Descarga la App!</h1>
        <p>Obtén la última versión estable directamente desde GitHub.</p>
        
        <a href="https://github.com/Benjhamyn992/calculo/releases/latest/download/app-release.apk" class="download-btn">
            Descargar APK
        </a>
    </div>

</body>
</html>
